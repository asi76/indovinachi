name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -s -X POST http://83.251.67.34:8000/api/v1/deploy             -H 'Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}'             -H 'Content-Type: application/json'             -d '{"uuid":"aanouyfkne2uebn0s0ega7lb","force":true}'
